services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: heartbeat
      POSTGRES_PASSWORD: heartbeat
      POSTGRES_DB: heartbeat
    ports:
      - "5432:5432"  # exposes DB to host for local dev/tests; conflicts if host Postgres is already on 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heartbeat"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: sh -c "uv run alembic upgrade head && uv run uvicorn heartbeat.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://heartbeat:heartbeat@db:5432/heartbeat
      CHECK_SOURCE: real
      EMAIL_SINK: log
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
