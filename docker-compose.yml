services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: heartbeat
      POSTGRES_PASSWORD: heartbeat
      POSTGRES_DB: heartbeat
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heartbeat"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://heartbeat:heartbeat@db:5432/heartbeat
      CHECK_SOURCE: real
      EMAIL_SINK: smtp
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
